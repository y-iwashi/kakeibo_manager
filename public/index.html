<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>DB管理システム</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="app-header">
        <div class="header-title">kakeibo manager v1.0</div>
    </header>

    <main class="app-main">
        <details class="search-accordion" open>
            <summary>検索条件</summary>
            <div class="search-list">
                <div class="search-item">
                    <label>ID範囲</label>
                    <div class="input-group">
                        <input type="number" id="search-id-min" placeholder="最小">
                        <span>〜</span>
                        <input type="number" id="search-id-max" placeholder="最大">
                    </div>
                </div>
                <div class="search-item">
                    <label>日付範囲</label>
                    <div class="input-group">
                        <input type="date" id="search-date-from">
                        <span>〜</span>
                        <input type="date" id="search-date-to">
                    </div>
                </div>
                <div class="search-item">
                    <label>金額範囲</label>
                    <div class="input-group">
                        <input type="number" id="search-amount-min" placeholder="最小">
                        <span>〜</span>
                        <input type="number" id="search-amount-max" placeholder="最大">
                    </div>
                </div>
                <div class="search-item"><label>店舗名</label><input type="text" id="search-shop"></div>
                <div class="search-item"><label>カテゴリ</label><input type="text" id="search-category"></div>
                <div class="search-item"><label>メンバー</label><input type="text" id="search-member"></div>
                <div class="search-item"><label>ファイル</label><input type="text" id="search-source-file"></div>
                <div class="search-item"><label>メモ</label><input type="text" id="search-memo"></div>

                <div class="search-item">
                    <label for="search-is-not-closed">未クローズのみ</label>
                    <input type="checkbox" id="search-is-not-closed">
                </div>

            </div>
            <button id="load-btn">最新データを取得</button>
        </details>

        <hr>

        <div class="table-container">
            <table id="data-table">
                <thead>
                    <tr>
                        <th data-key="id"><span class="sort-wrapper"><span class="sort-label">ID</span><span class="sort-icon"></span></span></th>
                        <th data-key="date"><span class="sort-wrapper"><span class="sort-label">日付</span><span class="sort-icon"></span></span></th>
                        <th data-key="shop"><span class="sort-wrapper"><span class="sort-label">店舗名</span><span class="sort-icon"></span></span></th>
                        <th data-key="amount"><span class="sort-wrapper"><span class="sort-label">金額</span><span class="sort-icon"></span></span></th>
                        <th data-key="category"><span class="sort-wrapper"><span class="sort-label">カテゴリ</span><span class="sort-icon"></span></span></th>
                        <th data-key="member"><span class="sort-wrapper"><span class="sort-label">メンバー</span><span class="sort-icon"></span></span></th>
                        <th data-key="is_closed"><span class="sort-wrapper"><span class="sort-label">完了</span><span class="sort-icon"></span></span></th>
                        <th data-key="memo"><span class="sort-wrapper"><span class="sort-label">メモ</span><span class="sort-icon"></span></span></th>
                        <th data-key="source_file"><span class="sort-wrapper"><span class="sort-label">元ファイル</span><span class="sort-icon"></span></span></th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </main>

    <footer class="app-footer">
        <div class="footer-stats">
            表示件数: <span id="stat-count">0</span> 件 / 
            合計金額: <span id="stat-sum">¥0</span>
        </div>
        <div class="footer-copy">&copy; 2026 https://github.com/y-iwashi</div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
